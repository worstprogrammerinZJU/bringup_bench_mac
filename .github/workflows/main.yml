name: Compile to ARM Assembly

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List repo files
        run: |
          echo "--- Current File List ---"
          find . -maxdepth 3 -not -path '*/.*'

      - name: Compile C files
        run: |
          # 1. 初始化输出目录
          rm -rf output_asm
          mkdir -p output_asm
          
          # 2. 获取 macOS SDK 路径
          SDK_PATH=$(xcrun --show-sdk-path)
          
          # 3. 核心：全局搜寻所有 .h 文件所在的目录作为头文件路径
          echo "Scanning for include directories..."
          INCLUDE_DIRS=$(find . -name "*.h" -not -path '*/.*' -exec dirname {} + | sort -u)
          INCLUDE_FLAGS=""
          for dir in $INCLUDE_DIRS; do
            INCLUDE_FLAGS="$INCLUDE_FLAGS -I$dir"
          done
          echo "Using Include Flags: $INCLUDE_FLAGS"

          # 4. 遍历所有 .c 文件进行编译
          find . -name "*.c" -not -path '*/.*' | while read -r c_file; do
            echo "--------------------------------"
            echo "Compiling file: $c_file"
            
            # 提取路径信息
            dir_name=$(dirname "$c_file")
            base_name=$(basename "$c_file" .c)
            
            # 去掉路径前面的 ./
            clean_dir=$(echo "$dir_name" | sed 's|^\./||')
            
            # 创建输出路径
            if [ "$clean_dir" = "." ]; then
              out_path="output_asm"
            else
              out_path="output_asm/$clean_dir"
              mkdir -p "$out_path"
            fi
            
            target_file="$out_path/${base_name}.s"
            
            # 编译为 ARM 汇编
            # -S: 生成汇编
            # -target: 指定 Mac ARM64 架构
            if clang -S -target arm64-apple-macos \
                  -isysroot "$SDK_PATH" \
                  $INCLUDE_FLAGS \
                  "$c_file" \
                  -o "$target_file"; then
              echo "Success: $target_file"
            else
              echo "Error: Failed to compile $c_file"
            fi
          done

      - name: Check output files
        run: |
          echo "--- Final Generated Files ---"
          find output_asm -name "*.s"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: arm-assembly-files
          path: output_asm/
