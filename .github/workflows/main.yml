name: Compile C to ARM Assembly (via GCC)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GNU GCC
        run: |
          brew install gcc
          # 获取安装后的 gcc 版本号（例如 gcc-14）
          echo "GCC_BIN=$(ls /opt/homebrew/bin/gcc-[0-9]* | head -n 1)" >> $GITHUB_ENV

      - name: Compile to ARM Assembly
        run: |
          mkdir -p output_asm
          
          # 查找所有的 .c 文件
          find . -name "*.c" -not -path '*/.*' | while read -r c_file; do
            dir_path=$(dirname "$c_file")
            file_name=$(basename "$c_file" .c)
            rel_dir=$(echo "$dir_path" | sed 's|^\./||')
            
            # 创建输出目录
            target_dir="output_asm/$rel_dir"
            mkdir -p "$target_dir"
            
            echo "Processing $c_file..."
            
            # 使用安装的 GNU GCC
            # -S: 生成汇编
            # -fomit-frame-pointer: 产生更简洁的汇编 (可选)
            # -I: 头文件路径
            $GCC_BIN -S -I "$dir_path" "$c_file" -o "$target_dir/${file_name}.s"
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: arm-assembly-gcc
          path: output_asm/
