- name: Compile C files
        run: |
          # 1. 初始化输出目录
          rm -rf output_asm
          mkdir -p output_asm
          
          # 2. 获取 macOS SDK 路径
          SDK_PATH=$(xcrun --show-sdk-path)
          
          # 3. 扫描头文件路径
          echo "Scanning for include directories..."
          INCLUDE_DIRS=$(find . -name "*.h" -not -path '*/.*' -exec dirname {} + | sort -u)
          INCLUDE_FLAGS=""
          for dir in $INCLUDE_DIRS; do
            INCLUDE_FLAGS="$INCLUDE_FLAGS -I$dir"
          done

          # 4. 【关键修复】尝试自动修复 libtarg.h 中的架构检查
          # 查找 libtarg.h 并在其中添加对 ARM64 的支持（简单粗暴法：把 #error 替换掉）
          find . -name "libtarg.h" -exec sed -i '' 's/#error Error: no definition for vararg functions!/#define TARG_VARARG_SKIP/g' {} +

          # 5. 遍历所有 .c 文件进行编译
          find . -name "*.c" -not -path '*/.*' | while read -r c_file; do
            echo "--------------------------------"
            echo "Compiling file: $c_file"
            
            dir_name=$(dirname "$c_file")
            base_name=$(basename "$c_file" .c)
            clean_dir=$(echo "$dir_name" | sed 's|^\./||')
            
            if [ "$clean_dir" = "." ]; then
              out_path="output_asm"
            else
              out_path="output_asm/$clean_dir"
              mkdir -p "$out_path"
            fi
            
            target_file="$out_path/${base_name}.s"
            
            # 【核心编译命令修改】
            # -DNULL: 手动定义 NULL
            # -D__x86_64__: 尝试欺骗 libtarg.h，让它走 x86 的路径（通常在生成汇编阶段，宏定义能绕过检查即可）
            # -Wno-everything: 忽略不必要的警告
            if clang -S -target arm64-apple-macos \
                  -isysroot "$SDK_PATH" \
                  $INCLUDE_FLAGS \
                  -DNULL='((void*)0)' \
                  -D__x86_64__ \
                  -Wno-invalid-pp-token \
                  "$c_file" \
                  -o "$target_file"; then
              echo "Success: $target_file"
            else
              echo "Error: Failed to compile $c_file"
            fi
          done
