name: Compile C to ARM Assembly (macOS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile to ARM Assembly
        run: |
          # 1. 获取 macOS SDK 路径（防止找不到系统头文件）
          SDK_PATH=$(xcrun --show-sdk-path)
          
          # 2. 【核心步骤】自动寻找所有包含 .h 文件的目录
          # 这会遍历整个仓库，找到所有 .h 所在的文件夹，并转换成 -I path1 -I path2 的格式
          echo "Scanning for header directories..."
          INCLUDE_FLAGS=$(find . -name "*.h" -not -path '*/.*' -exec dirname {} + | sort -u | sed 's|^|-I |' | tr '\n' ' ')
          echo "Include Flags: $INCLUDE_FLAGS"

          # 3. 创建输出目录
          mkdir -p output_asm
          
          # 4. 遍历所有 .c 文件进行编译
          find . -name "*.c" -not -path '*/.*' | while read -r c_file; do
            dir_path=$(dirname "$c_file")
            file_name=$(basename "$c_file" .c)
            rel_dir=$(echo "$dir_path" | sed 's|^\./||')
            
            # 准备输出路径
            if [ "$rel_dir" = "." ]; then
                target_dir="output_asm"
            else
                target_dir="output_asm/$rel_dir"
            fi
            mkdir -p "$target_dir"
            
            output_file="$target_dir/${file_name}.s"
            echo "------------------------------------------"
            echo "Compiling: $c_file"

            # 5. 执行编译
            # 使用了全局找到的 $INCLUDE_FLAGS
            if clang -S -target arm64-apple-macos \
                  -isysroot "$SDK_PATH" \
                  $INCLUDE_FLAGS \
                  "$c_file" \
                  -o "$output_file"; then
              echo "✅ Success: $output_file"
            else
              echo "❌ Error: Failed to compile $c_file"
              # 这里可以决定是否中断：如果想看到所有错误，就不加 exit 1
            fi
          done

      - name: Upload Assembly Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arm-assembly-files
          path: output_asm/
          if-no-files-found: error
